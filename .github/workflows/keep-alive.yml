name: Keep Render Alive

on:
  schedule:
    # 每 10 分钟执行一次
    - cron: '*/10 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          curl -s -o /dev/null -w "Status: %{http_code}\n" \
            https://autocheckimg.onrender.com
